<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Meter Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #0d1b2a, #1b2a4a);
    padding: 20px 30px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid #2a7fff;
  }
  .header h1 { font-size: 24px; color: #fff; }
  .header .status { display: flex; align-items: center; gap: 15px; font-size: 14px; color: #aaa; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .status-dot.online { background: #2f8; }
  .status-dot.offline { background: #f44; }

  .info-bar {
    background: #111; padding: 10px 30px; display: flex; gap: 30px;
    font-size: 13px; color: #888; border-bottom: 1px solid #222;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px; padding: 20px 30px;
  }

  .meter-card {
    background: #111827; border-radius: 12px; overflow: hidden;
    border: 1px solid #1e293b;
  }
  .meter-header {
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .meter-header h3 { font-size: 16px; color: #fff; }
  .meter-header .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600;
  }
  .badge.online { background: #064e3b; color: #34d399; }
  .badge.offline { background: #4c0519; color: #fb7185; }

  .params {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1e293b;
  }
  .param {
    background: #111827; padding: 12px 16px;
  }
  .param-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .param-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .param-unit { font-size: 13px; font-weight: 400; color: #64748b; margin-left: 4px; }

  .color-voltage .param-value { color: #fbbf24; }
  .color-current .param-value { color: #22d3ee; }
  .color-power .param-value { color: #4ade80; }
  .color-energy .param-value { color: #fb923c; }
  .color-freq .param-value { color: #e879f9; }
  .color-pf .param-value { color: #60a5fa; }
  .color-temp .param-value { color: #f87171; }

  .param-value.offline { color: #475569 !important; }

  .footer {
    text-align: center; padding: 20px; color: #444; font-size: 12px;
  }

  @media (max-width: 600px) {
    .header { flex-direction: column; gap: 10px; text-align: center; }
    .info-bar { flex-wrap: wrap; justify-content: center; }
    .grid { grid-template-columns: 1fr; padding: 10px; }
    .params { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Energy Meter Dashboard</h1>
  <div class="status">
    <span><span class="status-dot" id="connDot"></span> <span id="connText">Connecting...</span></span>
    <span id="fwVersion"></span>
  </div>
</div>

<div class="info-bar">
  <span>Last update: <strong id="lastUpdate">--</strong></span>
  <span>ESP32 IP: <strong id="espIP">--</strong></span>
  <span>Auto-refresh: <strong>10s</strong></span>
</div>

<div class="grid" id="meterGrid"></div>

<div class="footer">
  Energy Meter Dashboard &mdash; Firebase Realtime Database
</div>

<script>
const FIREBASE_URL = "https://energy-meter-5d179-default-rtdb.asia-southeast1.firebasedatabase.app/meters.json";
const REFRESH_MS = 10000;

const PARAMS = [
  { key: "voltage",   label: "Voltage",   unit: "V",   decimals: 1, colorClass: "color-voltage" },
  { key: "current",   label: "Current",   unit: "A",   decimals: 3, colorClass: "color-current" },
  { key: "power",     label: "Power",     unit: "W",   decimals: 1, colorClass: "color-power" },
  { key: "energy",    label: "Energy",    unit: "kWh", decimals: 2, colorClass: "color-energy" },
  { key: "frequency", label: "Frequency", unit: "Hz",  decimals: 2, colorClass: "color-freq" },
  { key: "pf",        label: "Power Factor", unit: "", decimals: 3, colorClass: "color-pf" },
  { key: "temp",      label: "Temperature", unit: "\u00B0C", decimals: 0, colorClass: "color-temp" }
];

const METER_COLORS = [
  "#2a7fff", "#82c000", "#07ffff", "#47e000",
  "#fea000", "#fc8000", "#5d5fff", "#f92000"
];

function buildCards() {
  const grid = document.getElementById("meterGrid");
  grid.innerHTML = "";
  for (let i = 1; i <= 8; i++) {
    const card = document.createElement("div");
    card.className = "meter-card";
    card.id = "meter" + i;

    let paramsHTML = "";
    PARAMS.forEach(p => {
      paramsHTML += `<div class="param ${p.colorClass}">
        <div class="param-label">${p.label}</div>
        <div class="param-value" id="m${i}_${p.key}">---<span class="param-unit">${p.unit}</span></div>
      </div>`;
    });

    card.innerHTML = `
      <div class="meter-header" style="border-left: 4px solid ${METER_COLORS[i-1]}">
        <h3>Meter ${i} <span style="color:#64748b;font-size:12px" id="m${i}_addr"></span></h3>
        <span class="badge offline" id="m${i}_badge">OFFLINE</span>
      </div>
      <div class="params">${paramsHTML}</div>`;
    grid.appendChild(card);
  }
}

function updateDashboard(data) {
  if (!data) {
    document.getElementById("connDot").className = "status-dot offline";
    document.getElementById("connText").textContent = "No data";
    return;
  }

  document.getElementById("connDot").className = "status-dot online";
  document.getElementById("connText").textContent = "Connected";

  if (data.fw_version) document.getElementById("fwVersion").textContent = "FW v" + data.fw_version;
  if (data.ip) document.getElementById("espIP").textContent = data.ip;
  if (data.timestamp) {
    const d = new Date(data.timestamp);
    document.getElementById("lastUpdate").textContent = d.toLocaleString();
  }

  for (let i = 1; i <= 8; i++) {
    const m = data["meter" + i];
    if (!m) continue;

    const badge = document.getElementById("m" + i + "_badge");
    badge.textContent = m.online ? "ONLINE" : "OFFLINE";
    badge.className = "badge " + (m.online ? "online" : "offline");

    document.getElementById("m" + i + "_addr").textContent = "[addr " + m.addr + "]";

    PARAMS.forEach(p => {
      const el = document.getElementById("m" + i + "_" + p.key);
      if (m.online) {
        const val = parseFloat(m[p.key]).toFixed(p.decimals);
        el.innerHTML = val + `<span class="param-unit">${p.unit}</span>`;
        el.classList.remove("offline");
      } else {
        el.innerHTML = `---<span class="param-unit">${p.unit}</span>`;
        el.classList.add("offline");
      }
    });
  }
}

async function fetchData() {
  try {
    const res = await fetch(FIREBASE_URL);
    const data = await res.json();
    updateDashboard(data);
  } catch (e) {
    document.getElementById("connDot").className = "status-dot offline";
    document.getElementById("connText").textContent = "Fetch error";
  }
}

buildCards();
fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
